name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Accept licenses & install SDK 36
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" || true

      - name: Install dependencies
        run: npm install

      - name: Verify setup
        run: |
          set +e
          echo "node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "pwd: $(pwd)"
          ls node_modules/.bin/ 2>&1 || true
          echo "---"
          test -f node_modules/.bin/cap && echo "cap: YES" || echo "cap: NO"
          test -f scripts/setup-capacitor.mjs && echo "script: YES" || echo "script: NO"
          npm ls @capacitor/cli 2>&1 || true

      - name: Setup Capacitor & add Android platform
        run: node scripts/setup-capacitor.mjs

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-log
          path: /tmp/capacitor-setup.log

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitMentor-APK
          path: android/app/build/outputs/apk/debug/*.apk
