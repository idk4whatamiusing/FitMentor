services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fitmentor
      POSTGRES_PASSWORD: fitmentor
      POSTGRES_DB: fitmentor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://fitmentor:fitmentor@postgres:5432/fitmentor
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      KAFKA_BROKERS: kafka:9092
      PORT: "3000"
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET:-}
    depends_on:
      - postgres
      - redis

  ws:
    build:
      context: .
      dockerfile: apps/ws/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis

  ingest:
    build:
      context: .
      dockerfile: apps/ingest-python/Dockerfile
    ports:
      - "8001:8001"
    environment:
      SUPERMEMORY_API_KEY: ${SUPERMEMORY_API_KEY:-}

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle
    ports:
      - "3001:3001"
    command: ["start", "--addresses=0.0.0.0:3001", "--format", "0", "/data/0_0.tigerbeetle"]
    volumes:
      - tbdata:/data

volumes:
  pgdata:
  rabbitmqdata:
  kafkadata:
  tbdata:
